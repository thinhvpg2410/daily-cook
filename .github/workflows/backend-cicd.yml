name: Backend CI/CD

on:
  push:
    branches:
      - feature/ai
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --runInBand

      - name: Build backend
        run: npm run build

      - name: Build docker image
        run: docker build -f backend/Dockerfile -t dailycook-backend:${{ github.sha }} ..

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/feature/ai'
    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            export PROJECT_DIR="${{ secrets.EC2_PROJECT_DIR }}"
            export BRANCH="feature/ai"
            chmod +x "$PROJECT_DIR/scripts/deploy-ec2.sh"
            "$PROJECT_DIR/scripts/deploy-ec2.sh"
